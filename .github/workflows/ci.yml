name: Packetor CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: TypeScript Check
        run: npm run build --if-present

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test -- --run

      - name: Build Docker Image
        run: docker build -t packetor:${{ github.sha }} .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: packetor-image
          path: .
